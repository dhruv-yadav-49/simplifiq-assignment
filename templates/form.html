<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>SimplifIQ — Lead Intake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 480px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
  p  { font-size: 14px; color: #666; margin-bottom: 28px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border: 1px solid #dde3ee; border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; margin-bottom: 18px; }
  input:focus { border-color: #4361ee; }
  button { width: 100%; padding: 14px; background: #4361ee; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s; }
  button:hover { background: #3451d1; }
  #result { margin-top: 18px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
  #result.success { background: #e8f5e9; color: #2e7d32; }
  #result.error   { background: #fdecea; color: #c62828; }
</style>
</head>
<body>
<div class="card">
  <h1>🚀 SimplifIQ Lead Intake</h1>
  <p>Submit your company details to receive a personalized AI Audit Report within seconds.</p>

  <label>Full Name *</label>
  <input type="text" id="name" placeholder="Dhruv Sharma"/>

  <label>Work Email *</label>
  <input type="email" id="email" placeholder="dhruv@yourcompany.com"/>

  <label>Company Name *</label>
  <input type="text" id="company" placeholder="Acme Corp"/>

  <label>Company Website</label>
  <input type="text" id="website" placeholder="https://yourcompany.com"/>

  <label>Your Role</label>
  <input type="text" id="role" placeholder="CEO, Founder, VP Sales…"/>

  <button onclick="submitForm()">Generate My Report →</button>
  <div id="result"></div>
</div>

<script>
async function submitForm() {
  const btn = document.querySelector('button');
  btn.textContent = "Generating report…";
  btn.disabled = true;

  const form = new FormData();
  form.append("name",    document.getElementById("name").value);
  form.append("email",   document.getElementById("email").value);
  form.append("company", document.getElementById("company").value);
  form.append("website", document.getElementById("website").value);
  form.append("role",    document.getElementById("role").value);

  const res = document.getElementById("result");
  try {
    const r = await fetch("/submit", { method: "POST", body: form });
    const d = await r.json();
    res.style.display = "block";
    if (r.ok) {
      res.className = "success";
      res.textContent = "✅ " + d.message;
    } else {
      res.className = "error";
      res.textContent = "❌ " + d.error;
    }
  } catch(e) {
    res.style.display = "block";
    res.className = "error";
    res.textContent = "❌ Network error. Please try again.";
  }
  btn.textContent = "Generate My Report →";
  btn.disabled = false;
}
</script>
</body>
</html>
